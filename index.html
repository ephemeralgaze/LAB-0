<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --white: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease: cubic-bezier(0.8, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--white);
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        /* Wave Background Canvas */
        #wave-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: transparent;
        }

        /* 1px Grid Borders */
        .ui-grid {
            position: fixed;
            inset: 0;
            border: 1px solid var(--grid-color);
            margin: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        /* 
           The Stage: Standard Centering.
           The #wordmark is child of this, so it stays centered via flex.
        */
        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        /* 
           Cohesive Wordmark Block.
           Statically centered via parent flexbox. 
           No custom translate(calc()) offsets.
        */
        #wordmark {
            display: flex;
            align-items: baseline;
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 1.5rem;
            white-space: nowrap;
            letter-spacing: 0.1em;
            
            /* Center visual anchor: 
               We start centered. In the docking phase, we transition 
               from center (0,0) to a calculated offset.
            */
            transform: translate(0, 0) scale(3.3333);
            transition: transform 1.2s var(--ease);
        }

        /*
           The reveal part (AB-0).
           Occupies layout space but is visually masked.
        */
        .ab0-reveal {
            display: inline-block;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.2s var(--ease);
        }

        #wordmark.assembled {
            transform: translate(0, 0) scale(3);
        }

        #wordmark.assembled .ab0-reveal {
            clip-path: inset(0 0 0 0);
        }

        /* 
           State 2: Docking.
           Transitions from 0,0 to the corner.
           Corner is at top 60, left 60.
           Viewport Center is 50vw, 50vh.
           We translate from center (0,0) to the target coordinates.
        */
        #wordmark.docked {
            /* 
               Shift from center back to the top-left (60, 60).
               50vw/50vh is center. 
               Translation = Target - Current(Center).
            */
            transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 60px + 0.4em)) scale(1);
        }

        /* UI Elements */
        .ui-element {
            position: fixed;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 10;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .ui-visible {
            opacity: 1;
        }

        /* Arrows Styling */
        .arrows-container {
            display: inline-flex;
            align-items: center;
            margin-left: 10px; /* Slight gap from the '0' */
            height: 1em; /* Baseline alignment aid */
        }

        .arrow-svg {
            width: 14px;
            height: 14px;
            margin-right: -6px; /* Tight aggressive overlap */
            display: block;
            fill: none;
            stroke: var(--white);
            stroke-width: 2.5;
            stroke-linecap: square;
            stroke-linejoin: miter;
            stroke-miterlimit: 10; /* Ensures razor-sharp vertex */
            
            /* Initial state for entry animation */
            opacity: 0;
            transform: translateX(-10px);
            /* COMPRESS DURATION: 0.8s -> 0.65s (~18% faster) */
            transition: opacity 0.65s var(--ease), transform 0.65s var(--ease);
            will-change: opacity, transform;
        }

        .arrow-svg:last-child {
            margin-right: 0;
        }

        /* Staggered transition delays for each arrow */
        /* COMPRESS STAGGER: 0.15s intervals -> 0.12s intervals (~18% faster) */
        .arrows-container.visible .arrow-svg:nth-child(1) {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0s;
        }

        .arrows-container.visible .arrow-svg:nth-child(2) {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0.12s;
        }

        .arrows-container.visible .arrow-svg:nth-child(3) {
            opacity: 1;
            transform: translateX(0);
            transition-delay: 0.24s;
        }

    </style>
</head>
<body>

    <canvas id="wave-canvas"></canvas>
    <div class="ui-grid" id="grid"></div>

    <div class="stage">
        <div id="wordmark">
            L<span class="ab0-reveal">AB-0</span>
            <span class="arrows-container" id="arrows">
                <svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg>
                <svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg>
                <svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg>
            </span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const arrows = document.getElementById('arrows');

            // Initial UI Animations
            setTimeout(() => wordmark.classList.add('assembled'), 1500);
            setTimeout(() => wordmark.classList.add('docked'), 3500);
            setTimeout(() => {
                grid.classList.add('ui-visible');
                arrows.classList.add('visible');
            }, 4700);

            // --- Optimized Elliptical Pulse Background ---
            const canvas = document.getElementById('wave-canvas');
            const ctx = canvas.getContext('2d', { alpha: true });
            
            let width, height, dots = [];
            
            // Configuration
            const spacing = 26; 
            const baseDotSize = 0.7;
            const pulseOpacity = 0.45;
            const pulseSize = 1.2;
            
            // Timing & Geometry
            const cycleDuration = 9; // Slower frequency: 9 seconds per cycle
            const speed = 1 / (60 * cycleDuration); 
            const ellipseStretch = 0.4; // Flatten the ellipse
            let time = 0;

            function resize() {
                const dpr = window.devicePixelRatio || 1;
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);
                initDots();
            }

            function initDots() {
                dots = [];
                const cols = Math.ceil(width / spacing) + 1;
                const rows = Math.ceil(height / spacing) + 1;
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        dots.push({ x: i * spacing, y: j * spacing });
                    }
                }
            }

            function animate() {
                time += speed; 
                ctx.clearRect(0, 0, width, height);
                
                const originX = width / 2;
                const originY = height + 200; // Origin below the screen to flatten the bottom
                
                // One traveling peak (Gaussian pulse)
                const progress = time % 1; 
                const waveRadius = progress * Math.max(width, height) * 2;

                for (let i = 0, len = dots.length; i < len; i++) {
                    const dot = dots[i];
                    
                    const dx = (dot.x - originX) * ellipseStretch;
                    const dy = (dot.y - originY);
                    const d = Math.sqrt(dx * dx + dy * dy);
                    
                    const distFromWave = Math.abs(d - waveRadius);
                    const intensity = Math.exp(-Math.pow(distFromWave, 2) / 15000);
                    
                    const opacity = Math.max(0.06, intensity * pulseOpacity);
                    const currentSize = baseDotSize + (intensity * pulseSize);
                    const edgeFalloff = Math.max(0, 1 - d / (Math.max(width, height) * 2.5));
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${opacity * edgeFalloff})`;
                    ctx.beginPath();
                    ctx.arc(dot.x, dot.y, currentSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', resize);
            resize();
            animate();
        });
    </script>
</body>
</html>
