<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --white: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease: cubic-bezier(0.8, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--white);
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        #matrix-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s var(--ease);
        }

        #matrix-canvas.visible {
            opacity: 1;
        }

        /* 1px Grid Borders */
        .ui-grid {
            position: fixed;
            inset: 0;
            border: 1px solid var(--grid-color);
            margin: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #wordmark {
            position: relative;
            display: flex;
            align-items: baseline;
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 1.5rem;
            white-space: nowrap;
            letter-spacing: 0.1em;
            transform: translate(0, 0) scale(3.3333);
            transition: transform 1.2s var(--ease);
        }

        .ab0-reveal {
            display: inline-flex;
            align-items: baseline;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.2s var(--ease);
        }

        #wordmark.assembled {
            transform: translate(0, 0) scale(3);
        }

        #wordmark.assembled .ab0-reveal {
            clip-path: inset(0 0 0 0);
        }

        #wordmark.docked {
            transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 45px + 0.4em)) scale(1);
        }

        /* Fixed Menu Items Architecture */
        .menu-items {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            padding-left: 25px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s var(--ease);
        }

        /* Visible when wordmark is docked and UI grid is visible (stable phase) */
        #wordmark.docked .menu-items.visible {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-item {
            color: var(--white);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            margin-right: 25px;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
        }

        .menu-item:hover {
            opacity: 0.7;
        }

        .ui-visible { opacity: 1; }

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <div class="ui-grid" id="grid"></div>

    <div class="stage">
        <div id="wordmark">
            L<span class="ab0-reveal">AB-0</span>
            <div class="menu-items" id="menu">
                <a href="#projects" class="menu-item">PROJECTS</a>
                <a href="#about" class="menu-item">ABOUT</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const menu = document.getElementById('menu');
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            let width, height;
            const dotSpacing = 30;
            const dots = [];

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width * window.devicePixelRatio;
                canvas.height = height * window.devicePixelRatio;
                canvas.style.width = width + 'px';
                canvas.style.height = height + 'px';
                ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                
                dots.length = 0;
                for (let x = 0; x < width; x += dotSpacing) {
                    for (let y = 0; y < height; y += dotSpacing) {
                        dots.push({ x, y });
                    }
                }
            }

            function draw(time) {
                ctx.clearRect(0, 0, width, height);
                
                const cycle = 10000; // 10s cycle
                const t = (time % cycle) / cycle;
                
                // Origin fixed at bottom center + 200px offset
                const originX = width / 2;
                const originY = height + 200;
                
                // Elliptical parameters
                const stretchFactor = 0.4; // horizontal stretch
                const maxRadius = Math.sqrt(Math.pow(width, 2) + Math.pow(height + 200, 2)) * 1.2;
                const pulseOpacityPeak = 0.20;

                dots.forEach(dot => {
                    const dx = dot.x - originX;
                    const dy = dot.y - originY;
                    
                    // Elliptical distance calculation
                    const dist = Math.sqrt(Math.pow(dx * stretchFactor, 2) + Math.pow(dy, 2));
                    
                    // Gaussian ripple calculation
                    const ripplePos = t * maxRadius;
                    const spread = 400;
                    const intensity = Math.exp(-Math.pow(dist - ripplePos, 2) / (2 * Math.pow(spread, 2)));
                    
                    if (intensity > 0.01) {
                        const size = 1 + intensity * 2;
                        const opacity = 0.05 + (pulseOpacityPeak - 0.05) * intensity;
                        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.beginPath();
                        ctx.arc(dot.x, dot.y, size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)'; // Base faint dots
                        ctx.fillRect(dot.x, dot.y, 1, 1);
                    }
                });

                requestAnimationFrame(draw);
            }

            window.addEventListener('resize', resize);
            resize();
            requestAnimationFrame(draw);

            // 1.5s: Start Assembly
            setTimeout(() => {
                wordmark.classList.add('assembled');
            }, 1500);

            // 3.5s: Start Docking
            setTimeout(() => {
                wordmark.classList.add('docked');
            }, 3500);

            // 4.7s: UI Grid Fade-in, Menu Reveal & Matrix Canvas Fade-in
            setTimeout(() => {
                grid.classList.add('ui-visible');
                menu.classList.add('visible');
                canvas.classList.add('visible');
            }, 4700);
        });
    </script>
</body>
</html>
