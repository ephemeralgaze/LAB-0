<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB-0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-color: #050505;
  --overlay-bg: rgba(5, 5, 5, 0.7);
  --white: #ffffff;
  --grid-color: rgba(255, 255, 255, 0.1);
  --font-header: "Syncopate", sans-serif;
  --font-body: "Space Grotesk", sans-serif;
  --font-mono: "Space Mono", monospace;
  --ease: cubic-bezier(0.8, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  width: 100%;
  height: 100%;
  background-color: var(--bg-color);
  color: var(--white);
  overflow: hidden;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* Canvas Layer */
#dot-matrix-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

/* Background Overlay for Glass Effect */
#bg-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1;
  pointer-events: none;
}

/* 1px Grid Borders */
.ui-grid {
  position: fixed;
  inset: 0;
  border: 1px solid var(--grid-color);
  margin: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease-out;
  z-index: 5;
}

/* NAVIGATION LAYER */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  pointer-events: none;
}

#wordmark {
  position: relative;
  display: flex;
  align-items: baseline;
  font-family: var(--font-header);
  font-weight: 700;
  font-size: 1.5rem;
  white-space: nowrap;
  letter-spacing: 0.1em;
  transform: scale(3.3333);
  transition: transform 1.2s var(--ease), opacity 0.8s ease;
  will-change: transform, clip-path;
  opacity: 1;
}

.ab0-reveal {
  display: inline-flex;
  align-items: baseline;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 1.2s var(--ease);
  will-change: clip-path;
}

#wordmark.assembled {
  transform: scale(3);
}

#wordmark.assembled .ab0-reveal {
  clip-path: inset(0 0 0 0) !important;
}

#wordmark.docked {
  transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 45px + 0.4em)) scale(1);
  pointer-events: auto;
}

.menu-items {
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  padding-left: 25px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s var(--ease);
}

#wordmark.docked .menu-items.visible {
  pointer-events: auto;
  opacity: 1;
}

.menu-item {
  color: var(--white);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  margin-right: 25px;
  text-transform: uppercase;
  transition: opacity 0.15s ease-out;
  cursor: pointer;
  pointer-events: auto;
  opacity: 0.75;
}

.menu-item:hover {
  opacity: 1;
}

.menu-item.active {
  opacity: 1;
  pointer-events: none;
}

.ui-visible { opacity: 1 !important; }

/* OVERLAY STYLES */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s var(--ease);
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.overlay-frame {
  position: absolute;
  inset: 40px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  pointer-events: none;
}

.coord {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
  letter-spacing: 0.1em;
}
.coord-tl { top: -20px; left: 0; }
.coord-br { bottom: -20px; right: 0; }

.reticle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 40px;
  height: 40px;
  transform: translate(-50%, -50%);
  opacity: 0.15;
}

.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  width: 100%;
  max-width: 1200px;
  padding: 80px;
  pointer-events: auto;
}

.col-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px;
  background: rgba(255, 255, 255, 0.05);
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.username {
  font-family: var(--font-header);
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  color: var(--white);
  text-transform: lowercase;
}

.col-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 25px;
  font-family: var(--font-mono);
}

.info-item {
  display: flex;
  align-items: center;
  gap: 20px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.info-icon {
  width: 18px;
  height: 18px;
  opacity: 0.8;
  flex-shrink: 0;
}

.info-label {
  width: 100px;
  font-size: 0.6rem;
  color: rgba(255, 255, 255, 0.3);
  text-transform: uppercase;
}

.info-value {
  color: var(--white);
  text-transform: uppercase;
}
</style>
</head>
<body>

<canvas id="dot-matrix-canvas"></canvas>
<div id="bg-overlay"></div>
<div class="ui-grid" id="grid"></div>

<div class="stage">
<div id="wordmark">
<a id="nav-home" class="menu-item" style="font-family:inherit; font-size:inherit; letter-spacing:inherit; margin:0; padding:0; text-transform: none;">L<span class="ab0-reveal">AB-0</span></a>
<div class="menu-items" id="menu">
<a id="projects-trigger" class="menu-item">PROJECTS</a>
<a id="about-trigger" class="menu-item">ABOUT</a>
</div>
</div>
</div>

<div id="about-overlay" class="overlay">
<div class="overlay-frame">
<span class="coord coord-tl">[0000, 0000]</span>
<span class="coord coord-br">[0000, 0000]</span>
</div>
<svg class="reticle" viewBox="0 0 40 40">
<line x1="20" y1="0" x2="20" y2="40" stroke="white" stroke-width="1"/>
<line x1="0" y1="20" x2="40" y2="20" stroke="white" stroke-width="1"/>
</svg>
<div class="content-grid">
  <div class="col-left">
    <div class="avatar">
      <img src="https://avatars.githubusercontent.com/u/291265014?v=4" alt="ephemeralgaze">
    </div>
    <div class="username">ephemeralgaze</div>
  </div>
  <div class="col-right">
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 10v6M2 10v6M12 4L2 10l10 6 10-6-10-6zM12 18v-6" />
      </svg>
      <span class="info-label">Education</span>
      <span class="info-value">Undergraduate / Game Dev</span>
    </div>
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      <span class="info-label">Age</span>
      <span class="info-value">21</span>
    </div>
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
        <polyline points="22,6 12,13 2,6" />
      </svg>
      <span class="info-label">Contact</span>
      <span class="info-value" style="text-transform: none;">zgnx4ndcq5@privaterelay.appleid.com</span>
    </div>
  </div>
</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('dot-matrix-canvas');
  const ctx = canvas.getContext('2d');
  let dots = [];
  let width, height, dpr;

  const GRID_SIZE = 30;
  const DOT_RADIUS = 1.2;

  function init() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    
    dots = [];
    const cols = Math.ceil(width / GRID_SIZE);
    const rows = Math.ceil(height / GRID_SIZE);

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        dots.push({
          x: i * GRID_SIZE + GRID_SIZE / 2,
          y: j * GRID_SIZE + GRID_SIZE / 2,
          phase: Math.random() * Math.PI * 2,
          freq: 0.02 + Math.random() * 0.03,
          maxOpacity: 0.05 + Math.random() * 0.55
        });
      }
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, width, height);
    
    dots.forEach(dot => {
      const opacity = (Math.sin(time * 0.001 * dot.freq * 100 + dot.phase) * 0.5 + 0.5) * dot.maxOpacity;
      ctx.beginPath();
      ctx.arc(dot.x, dot.y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, " + opacity.toFixed(3) + ")";
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', init);
  init();
  requestAnimationFrame(draw);
})();

document.addEventListener("DOMContentLoaded", () => {
  const wordmark = document.getElementById("wordmark");
  const grid = document.getElementById("grid");
  const menu = document.getElementById("menu");
  const aboutTrigger = document.getElementById("about-trigger");
  const navHome = document.getElementById("nav-home");
  const aboutOverlay = document.getElementById("about-overlay");

  setTimeout(() => { if (wordmark) wordmark.classList.add("assembled"); }, 1500);
  setTimeout(() => { if (wordmark) wordmark.classList.add("docked"); }, 3500);
  setTimeout(() => {
    if (grid) grid.classList.add("ui-visible");
    if (menu) menu.classList.add("visible");
  }, 4700);

  const switchPage = (pageId) => {
    if (pageId === 'about') {
      if (aboutOverlay) aboutOverlay.classList.add("active");
      if (aboutTrigger) aboutTrigger.classList.add("active");
      if (navHome) navHome.classList.remove("active");
    } else {
      if (aboutOverlay) aboutOverlay.classList.remove("active");
      if (aboutTrigger) aboutTrigger.classList.remove("active");
      if (navHome) navHome.classList.add("active");
    }
  };

  if (aboutTrigger) {
    aboutTrigger.addEventListener("click", (e) => {
      e.preventDefault();
      switchPage('about');
    });
  }

  if (navHome) {
    navHome.addEventListener("click", (e) => {
      e.preventDefault();
      switchPage('home');
    });
  }
});
</script>
</body>
</html>
