<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --white: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
            
            /* Metric constants for Syncopate Bold */
            --w-l: 0.58em;
            --w-a: 0.76em;
            --w-b: 0.70em;
            --w-gap: 0.20em; /* 0.1em margin-left + 0.1em letter-spacing */
            
            /* Initial: Center of L */
            --center-l: calc(var(--w-l) / 2);
            
            /* Assembled: Center of B */
            /* Distance: (L/2) + gap + A + (B/2) */
            --center-b: calc(var(--w-l) + var(--w-gap) + var(--w-a) + (var(--w-b) / 2));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--white);
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        /* 1px Grid Borders */
        .ui-grid {
            position: fixed;
            inset: 0;
            border: 1px solid var(--grid-color);
            margin: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        /* Intro Sequence */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 
           The Sliding Door Wordmark.
           Fixed at docked position (60, 60), using transforms for intro.
        */
        #wordmark {
            display: flex;
            align-items: baseline;
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 1.5rem;
            position: fixed;
            top: 60px;
            left: 60px;
            transform-origin: top left;
            white-space: nowrap;
            z-index: 100;
            
            /* Initial State: L perfectly centered. */
            transform: translate(calc(50vw - 60px - var(--center-l)), calc(50vh - 60px - 0.4em)) scale(3.3333);
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .l {
            display: inline-block;
            width: var(--w-l);
        }

        /* 
           The Sliding Reveal Container.
        */
        .ab0-reveal-container {
            display: flex;
            align-items: baseline;
            margin-left: 0.1em;
            letter-spacing: 0.1em;
        }

        .char-wrapper {
            display: inline-block;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition-delay: calc(0.2s + var(--index) * 0.15s);
            vertical-align: baseline;
        }

        /* State 1: Assembled Center.
           B perfectly centered.
        */
        #wordmark.assembled {
            transform: translate(calc(50vw - 60px - var(--center-b)), calc(50vh - 60px - 0.4em)) scale(3);
        }

        #wordmark.assembled .char-wrapper {
            opacity: 1;
            transform: translateX(0);
        }

        /* State 2: Docked. No transform. */
        #wordmark.docked {
            transform: translate(0, 0) scale(1);
        }

        /* UI Elements */
        .ui-element {
            position: fixed;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 10;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .ui-visible {
            opacity: 1;
        }

        .coords-tracker {
            bottom: 60px;
            left: 60px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .system-status {
            top: 60px;
            right: 60px;
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .dot-matrix {
            width: 6px;
            height: 6px;
            background: var(--white);
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .terminal-log {
            bottom: 60px;
            right: 60px;
            text-align: right;
            font-size: 0.7rem;
            line-height: 1.5;
        }

        .terminal-log span {
            display: block;
            color: rgba(255, 255, 255, 0.4);
        }

        .terminal-log .ready {
            color: var(--white);
            font-weight: bold;
            margin-top: 4px;
        }

    </style>
</head>
<body>

    <div class="ui-grid" id="grid"></div>

    <div class="stage">
        <div id="wordmark">
            <span class="l">L</span>
            <div class="ab0-reveal-container">
                <span class="char-wrapper" style="--index: 0">A</span>
                <span class="char-wrapper" style="--index: 1">B</span>
                <span class="char-wrapper" style="--index: 2">-</span>
                <span class="char-wrapper" style="--index: 3">0</span>
            </div>
        </div>
    </div>

    <!-- UI Overlays -->
    <div class="ui-element coords-tracker" id="ui-coords">
        X-0000 // Y-0000
    </div>

    <div class="ui-element system-status" id="ui-status">
        <div class="dot-matrix"></div>
        SYSTEM ACTIVE // LOGGED
    </div>

    <div class="ui-element terminal-log" id="ui-terminal">
        <span>BUFF_OVR: CLEAR</span>
        <span>LINK: ESTABLISHED</span>
        <span class="ready">SYSTEM READY</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const uiCoords = document.getElementById('ui-coords');
            const uiStatus = document.getElementById('ui-status');
            const uiTerminal = document.getElementById('ui-terminal');

            // 1.5s: Start Assembly (Sliding Reveal)
            setTimeout(() => {
                wordmark.classList.add('assembled');
            }, 1500);

            // 3.5s: Start Docking
            setTimeout(() => {
                wordmark.classList.add('docked');
            }, 3500);

            // 4.7s: UI Fade-in
            setTimeout(() => {
                grid.classList.add('ui-visible');
                uiCoords.classList.add('ui-visible');
                uiStatus.classList.add('ui-visible');
                uiTerminal.classList.add('ui-visible');
            }, 4700);

            // Cursor Coordinate Tracker
            window.addEventListener('mousemove', (e) => {
                const x = e.clientX.toString().padStart(4, '0');
                const y = e.clientY.toString().padStart(4, '0');
                uiCoords.innerText = `X-${x} // Y-${y}`;
            });
        });
    </script>
</body>
</html>
