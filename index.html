<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --white: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease: cubic-bezier(0.8, 0, 0.2, 1);
            --elastic: cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--white);
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        /* 1px Grid Borders */
        .ui-grid {
            position: fixed;
            inset: 0;
            border: 1px solid var(--grid-color);
            margin: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        .stage {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        #wordmark {
            position: relative;
            display: flex;
            align-items: baseline;
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 1.5rem;
            white-space: nowrap;
            letter-spacing: 0.1em;
            transform: translate(0, 0) scale(3.3333);
            transition: transform 1.2s var(--ease);
        }

        .ab0-reveal {
            display: inline-flex;
            align-items: baseline;
            clip-path: inset(0 100% 0 0);
            transition: clip-path 1.2s var(--ease);
        }

        #wordmark.assembled {
            transform: translate(0, 0) scale(3);
        }

        #wordmark.assembled .ab0-reveal {
            clip-path: inset(0 0 0 0);
        }

        #wordmark.docked {
            transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 45px + 0.4em)) scale(1);
        }

        /* Elastic Portal Structure */
        .zero-portal {
            position: relative;
            display: inline-flex;
            align-items: baseline;
        }

        .zero-char {
            display: inline-block;
            transform-origin: center;
            transition: transform 0.6s var(--elastic);
        }

        .menu-items {
            position: absolute; /* Lock position relative to zero-portal */
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            width: 0;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.7s var(--ease);
            padding-left: 0;
            pointer-events: none;
        }

        .menu-item {
            color: var(--white);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            margin-right: 25px;
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
        }

        /* Expanded State Logic via #wordmark */
        #wordmark.expanded .zero-char {
            animation: stretch-open-v 0.8s var(--ease) forwards;
        }

        #wordmark.expanded .menu-items {
            width: 250px;
            padding-left: 25px;
            pointer-events: auto;
        }

        #wordmark.expanded .menu-item {
            opacity: 1;
            transform: translateX(0);
        }

        #wordmark.expanded .menu-item:nth-child(1) { transition-delay: 0.3s; }
        #wordmark.expanded .menu-item:nth-child(2) { transition-delay: 0.4s; }

        /* Collapsing State Logic via #wordmark */
        #wordmark.collapsing .zero-char {
            animation: stretch-close-v 0.6s var(--ease) forwards;
        }

        #wordmark.collapsing .menu-items {
            transition: width 0.4s var(--ease);
        }

        #wordmark.collapsing .menu-item {
            transition: none;
            opacity: 0;
            transform: translateX(-10px);
        }

        /* Vertical Stretch Animations */
        @keyframes stretch-open-v {
            0% { transform: scaleY(1); }
            40% { transform: scaleY(3.0); }
            100% { transform: scaleY(1); }
        }

        @keyframes stretch-close-v {
            0% { transform: scaleY(1); }
            40% { transform: scaleY(2.0); }
            100% { transform: scaleY(1); }
        }

        /* Arrows Interaction */
        .arrows-container {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            margin-left: 10px;
            height: 1em;
            cursor: pointer;
            pointer-events: none;
            transition: transform 0.7s var(--ease), margin-left 0.7s var(--ease);
            z-index: 10;
        }

        #wordmark.docked .arrows-container {
            pointer-events: auto;
        }

        /* Dragging effect: push arrows to the right when expanded */
        #wordmark.expanded .arrows-container {
            transform: translate(220px, -50%);
        }

        .arrow-svg {
            width: 14px;
            height: 14px;
            margin-right: -6px;
            display: block;
            fill: none;
            stroke: var(--white);
            stroke-width: 2.5;
            stroke-linecap: square;
            stroke-linejoin: miter;
            stroke-miterlimit: 10;
            opacity: 0;
            transform: translateX(-10px) rotate(0deg);
            transition: opacity 0.65s var(--ease), transform 0.65s var(--ease);
            will-change: opacity, transform;
        }

        .arrow-svg:last-child { margin-right: 0; }

        .arrows-container.visible .arrow-svg:nth-child(1) { opacity: 1; transform: translateX(0); transition-delay: 0s; }
        .arrows-container.visible .arrow-svg:nth-child(2) { opacity: 1; transform: translateX(0); transition-delay: 0.12s; }
        .arrows-container.visible .arrow-svg:nth-child(3) { opacity: 1; transform: translateX(0); transition-delay: 0.24s; }

        /* Rotate arrows 180 on expansion via #wordmark.expanded */
        #wordmark.expanded .arrows-container .arrow-svg {
            transform: rotate(180deg);
            transition: transform 0.5s var(--ease);
        }

        #wordmark.expanded .arrows-container .arrow-svg:nth-child(1) { transition-delay: 0.5s; }
        #wordmark.expanded .arrows-container .arrow-svg:nth-child(2) { transition-delay: 0.6s; }
        #wordmark.expanded .arrows-container .arrow-svg:nth-child(3) { transition-delay: 0.7s; }

        /* Instant back rotation on collapse via #wordmark.collapsing */
        #wordmark.collapsing .arrows-container .arrow-svg {
            transform: rotate(0deg);
            transition: transform 0.2s var(--ease);
            transition-delay: 0s !important;
        }

        .ui-visible { opacity: 1; }

    </style>
</head>
<body>

    <div class="ui-grid" id="grid"></div>

    <div class="stage">
        <div id="wordmark">L<span class="ab0-reveal">AB-<span class="zero-portal" id="zero-portal"><span class="zero-char" id="zero-char">0</span><span class="menu-items" id="menu-items"><a href="#projects" class="menu-item">PROJECTS</a><a href="#about" class="menu-item">ABOUT</a></span></span></span><span class="arrows-container" id="arrows"><svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg><svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg><svg class="arrow-svg" viewBox="0 0 24 24"><path d="M4 4l12 8-12 8" /></svg></span></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const arrows = document.getElementById('arrows');

            let isDocked = false;

            // 1.5s: Start Assembly
            setTimeout(() => {
                wordmark.classList.add('assembled');
            }, 1500);

            // 3.5s: Start Docking
            setTimeout(() => {
                wordmark.classList.add('docked');
                isDocked = true;
            }, 3500);

            // 4.7s: UI Fade-in & Arrows Reveal
            setTimeout(() => {
                grid.classList.add('ui-visible');
                arrows.classList.add('visible');
            }, 4700);

            // Toggle Elastic Menu Expansion on #wordmark
            arrows.addEventListener('click', () => {
                if (!isDocked) return;

                if (wordmark.classList.contains('expanded')) {
                    // Close Sequence
                    wordmark.classList.remove('expanded');
                    wordmark.classList.add('collapsing');
                    
                    // Reset collapsing state after animation completes
                    setTimeout(() => {
                        wordmark.classList.remove('collapsing');
                    }, 600);
                } else {
                    // Open Sequence
                    wordmark.classList.remove('collapsing');
                    wordmark.classList.add('expanded');
                }
            });
        });
    </script>
</body>
</html>
