<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAB-0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-color: #050505;
  --overlay-bg: rgba(5, 5, 5, 0.7);
  --white: #ffffff;
  --grid-color: rgba(255, 255, 255, 0.1);
  --font-header: "Syncopate", sans-serif;
  --font-body: "Space Grotesk", sans-serif;
  --font-mono: "Space Mono", monospace;
  --ease: cubic-bezier(0.8, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  width: 100%;
  height: 100%;
  background-color: var(--bg-color);
  color: var(--white);
  overflow: hidden;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* Canvas Layer */
#dot-matrix-canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

/* Background Overlay for Glass Effect */
#bg-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1;
  pointer-events: none;
}

/* 1px Grid Borders */
.ui-grid {
  position: fixed;
  inset: 0;
  border: none;
  margin: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease-out;
  z-index: 5;
}

/* NAVIGATION LAYER */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  pointer-events: none;
}

#wordmark {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-weight: 700;
  font-size: 1.5rem;
  white-space: nowrap;
  letter-spacing: 0.1em;
  transform: scale(3.3333);
  transition: transform 1.2s var(--ease), opacity 0.8s ease;
  will-change: transform;
  opacity: 1;
}

.ab0-reveal {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 1.2s var(--ease), opacity 0.6s var(--ease), width 1.2s var(--ease);
  will-change: clip-path;
  opacity: 0;
  width: 0;
  overflow: hidden;
}

#wordmark.assembled .ab0-reveal {
  opacity: 1;
  width: auto;
  clip-path: inset(-0.5em 0 -0.5em 0) !important;
}

#wordmark.docked {
  transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 45px + 0.4em)) scale(1);
  pointer-events: auto;
}

.desktop-icon {
  width: 1.1em;
  height: 1.1em;
  margin-left: 0.15em;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  display: inline-block;
}

.mobile-icon {
  width: 1.1em;
  height: 1.1em;
  margin-left: 0.2em;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  display: none !important;
}

/* MOBILE NAV OVERRIDES */
@media (max-width: 768px) {
  #wordmark {
    letter-spacing: 0;
    transform: scale(3.3333);
    width: 1.2ch; 
    overflow: visible;
  }

  .l-char {
    display: inline-block;
    width: 100%;
    text-align: center;
  }

  #wordmark .ab0-reveal {
    position: absolute;
    left: 100%;
    top: 0;
    width: auto;
    clip-path: inset(0 100% 0 0) !important;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: clip-path 0.8s var(--ease), opacity 0.4s var(--ease), visibility 0.4s var(--ease);
    display: inline-flex;
    align-items: center;
  }

  #wordmark.docked {
    transform: translate(calc(-50vw + 30px + 0.5ch), calc(-50vh + 39px)) scale(0.85);
    justify-content: flex-start;
  }

  .desktop-icon {
    display: none !important;
  }

  .mobile-icon {
    display: inline-block !important;
    margin-left: 0.08em;
    vertical-align: middle;
  }

  #wordmark.docked-final .ab0-reveal {
    opacity: 1;
    width: auto;
    visibility: visible;
    clip-path: inset(-0.5em 0 -0.5em 0) !important;
  }

  .ui-grid { margin: 10px; }
  .menu-items { display: none !important; }
  .content-grid { padding: 80px 20px 40px !important; }
}

.menu-items {
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  padding-left: 25px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s var(--ease);
}

#wordmark.docked .menu-items.visible {
  pointer-events: auto;
  opacity: 1;
}

/* SpaceX-style Hamburger Menu */
.hamburger {
  position: fixed;
  top: 30px;
  right: 30px;
  width: 24px;
  height: 14px;
  display: none;
  flex-direction: column;
  justify-content: space-between;
  cursor: pointer;
  z-index: 10001;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease-out;
}

.hamburger.ui-visible {
  opacity: 1;
  pointer-events: auto;
}

.hamburger span {
  display: block;
  width: 100%;
  height: 1px;
  background-color: var(--white);
  transition: transform 0.4s var(--ease), opacity 0.4s var(--ease);
}

.hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

@media (max-width: 768px) {
  .hamburger { display: flex; }
}

/* Mobile Nav Drawer */
.mobile-nav-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-color);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  transform: translateX(100%);
  transition: transform 0.6s var(--ease);
  pointer-events: auto;
}

.mobile-nav-overlay.open {
  transform: translateX(0);
}

.mobile-menu-item {
  font-family: var(--font-header);
  font-size: 1.2rem;
  letter-spacing: 0.3em;
  color: var(--white);
  text-decoration: none;
  text-transform: uppercase;
  opacity: 0.6;
  transition: opacity 0.3s ease;
}

.mobile-menu-item.active { opacity: 1; }

.menu-item {
  color: var(--white);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  margin-right: 25px;
  text-transform: uppercase;
  transition: opacity 0.15s ease-out, filter 0.15s ease-out;
  cursor: pointer;
  pointer-events: auto;
  opacity: 0.75;
}

.menu-item:hover { opacity: 1; }
.menu-item.active {
  opacity: 1 !important;
  color: #FFFFFF !important;
  pointer-events: none;
}
.ui-visible { opacity: 1 !important; }

/* OVERLAY STYLES */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s var(--ease);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-y: auto;
  visibility: hidden;
}

.overlay.active {
  opacity: 1;
  pointer-events: auto;
  visibility: visible;
}

.overlay-frame {
  position: absolute;
  inset: 40px;
  border: none;
  pointer-events: none;
}

@media (max-width: 768px) {
  .overlay-frame { inset: 20px; }
}

.coord {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
  letter-spacing: 0.1em;
}
.coord-tl { top: -20px; left: 0; }
.coord-br { bottom: -20px; right: 0; }

.reticle {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 40px;
  height: 40px;
  transform: translate(-50%, -50%);
  opacity: 0.15;
}

.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  width: 100%;
  max-width: 1200px;
  padding: 80px;
  pointer-events: auto;
}

@media (max-width: 768px) {
  .content-grid {
    grid-template-columns: 1fr;
    gap: 40px;
    padding: 100px 40px 60px;
  }
}

.col-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

@media (max-width: 768px) {
  .col-left { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 40px; }
}

.avatar {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 8px;
  background: rgba(255, 255, 255, 0.05);
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.username {
  font-family: var(--font-header);
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  color: var(--white);
  text-transform: lowercase;
}

.col-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 25px;
  font-family: var(--font-mono);
}

.info-item {
  display: flex;
  align-items: center;
  gap: 20px;
  color: rgba(255, 255, 255, 0.7);
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.info-icon {
  width: 18px;
  height: 18px;
  opacity: 0.8;
  flex-shrink: 0;
}

.info-label {
  width: 100px;
  font-size: 0.6rem;
  color: rgba(255, 255, 255, 0.3);
  text-transform: uppercase;
}

.info-value {
  color: var(--white);
  text-transform: uppercase;
}
</style>
</head>
<body>

<canvas id="dot-matrix-canvas"></canvas>
<div id="bg-overlay"></div>
<div class="ui-grid" id="grid"></div>

<div class="hamburger" id="hamburger">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="mobile-nav-overlay" id="mobile-nav">
  <a class="mobile-menu-item" id="m-nav-home">HOME</a>
  <a class="mobile-menu-item" id="m-projects-trigger">PROJECTS</a>
  <a class="mobile-menu-item" id="m-about-trigger">ABOUT</a>
</div>

<div class="stage">
<div id="wordmark">
<a id="nav-home" class="menu-item" style="font-family:inherit; font-size:inherit; letter-spacing:inherit; margin:0; padding:0; text-transform: none; display: flex; align-items: center;">
  <span class="l-char">L</span><span class="ab0-reveal">AB-<svg class="desktop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
    <line x1="8" y1="21" x2="16" y2="21"></line>
    <line x1="12" y1="17" x2="12" y2="21"></line>
  </svg><svg class="mobile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
    <line x1="12" y1="18" x2="12" y2="18"></line>
  </svg></span>
</a>
<div class="menu-items" id="menu">
<a id="projects-trigger" class="menu-item">PROJECTS</a>
<a id="about-trigger" class="menu-item">ABOUT</a>
</div>
</div>
</div>

<!-- ABOUT OVERLAY -->
<div id="about-overlay" class="overlay">
<div class="overlay-frame">
<span class="coord coord-tl">[0000, 0000]</span>
<span class="coord coord-br">[0000, 0000]</span>
</div>
<svg class="reticle" viewBox="0 0 40 40">
<line x1="20" y1="0" x2="20" y2="40" stroke="white" stroke-width="1"/>
<line x1="0" y1="20" x2="40" y2="20" stroke="white" stroke-width="1"/>
</svg>
<div class="content-grid">
  <div class="col-left">
    <div class="avatar">
      <img src="https://avatars.githubusercontent.com/u/291265014?v=4" alt="ephemeralgaze">
    </div>
    <div class="username">ephemeralgaze</div>
  </div>
  <div class="col-right">
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M22 10v6M2 10v6M12 4L2 10l10 6 10-6-10-6zM12 18v-6" />
      </svg>
      <span class="info-label">Education</span>
      <span class="info-value">Undergraduate / Game Dev</span>
    </div>
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      <span class="info-label">Age</span>
      <span class="info-value">21</span>
    </div>
    <div class="info-item">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
        <polyline points="22,6 12,13 2,6" />
      </svg>
      <span class="info-label">Contact</span>
      <span class="info-value" style="text-transform: none;">zgnx4ndcq5@privaterelay.appleid.com</span>
    </div>
  </div>
</div>
</div>

<script>
(function() {
  var canvas = document.getElementById("dot-matrix-canvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var dots = [];
  var width, height, dpr;

  var GRID_SIZE = 30;
  var DOT_RADIUS = 1.2;

  function init() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = document.documentElement.clientHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    
    dots = [];
    var isMobile = width <= 768;
    var effectiveGridSize = isMobile ? 15 : GRID_SIZE;
    var cols = Math.ceil(width / effectiveGridSize);
    var rows = Math.ceil(height / effectiveGridSize);

    for (var i = 0; i < cols; i++) {
      for (var j = 0; j < rows; j++) {
        dots.push({
          x: i * effectiveGridSize + effectiveGridSize / 2,
          y: j * effectiveGridSize + effectiveGridSize / 2,
          phase: Math.random() * Math.PI * 2,
          freq: 0.02 + Math.random() * 0.03,
          maxOpacity: 0.05 + Math.random() * 0.55
        });
      }
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, width, height);
    dots.forEach(function(dot) {
      var opacity = (Math.sin(time * 0.001 * dot.freq * 100 + dot.phase) * 0.5 + 0.5) * dot.maxOpacity;
      ctx.beginPath();
      ctx.arc(dot.x, dot.y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, " + opacity.toFixed(3) + ")";
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", init);
  init();
  requestAnimationFrame(draw);
})();

document.addEventListener("DOMContentLoaded", function() {
  var wordmark = document.getElementById("wordmark");
  var grid = document.getElementById("grid");
  var menu = document.getElementById("menu");
  var aboutTrigger = document.getElementById("about-trigger");
  var navHome = document.getElementById("nav-home");
  var aboutOverlay = document.getElementById("about-overlay");
  var hamburger = document.getElementById("hamburger");
  var mobileNav = document.getElementById("mobile-nav");
  var mNavHome = document.getElementById("m-nav-home");
  var mAboutTrigger = document.getElementById("m-about-trigger");

  var isMobile = window.innerWidth <= 768;

  if (isMobile) {
    setTimeout(function() { 
      if (wordmark) wordmark.classList.add("docked");
    }, 3500);
    setTimeout(function() {
      if (grid) grid.classList.add("ui-visible");
      if (hamburger) hamburger.classList.add("ui-visible");
      if (menu) menu.classList.add("visible");
      if (wordmark) {
        wordmark.classList.add("assembled");
        wordmark.classList.add("docked-final");
      }
    }, 4700);
  } else {
    setTimeout(function() {
      if (wordmark) wordmark.classList.add("assembled");
    }, 1500);
    setTimeout(function() {
      if (wordmark) wordmark.classList.add("docked");
    }, 3500);
    setTimeout(function() {
      if (grid) grid.classList.add("ui-visible");
      if (hamburger) hamburger.classList.add("ui-visible");
      if (menu) menu.classList.add("visible");
    }, 4700);
  }

  function switchPage(pageId) {
    if (aboutOverlay) aboutOverlay.classList.remove("active");
    if (pageId === "about") {
      if (aboutOverlay) aboutOverlay.classList.add("active");
    }
    if (hamburger) hamburger.classList.remove("open");
    if (mobileNav) mobileNav.classList.remove("open");
  }

  if (hamburger) {
    hamburger.addEventListener("click", function() {
      hamburger.classList.toggle("open");
      mobileNav.classList.toggle("open");
    });
  }

  if (aboutTrigger) aboutTrigger.addEventListener("click", function(e) { e.stopPropagation(); switchPage("about"); });
  if (navHome) navHome.addEventListener("click", function(e) { e.stopPropagation(); switchPage("home"); });
  if (mAboutTrigger) mAboutTrigger.addEventListener("click", function() { switchPage("about"); });
  if (mNavHome) mNavHome.addEventListener("click", function() { switchPage("home"); });
  if (aboutOverlay) aboutOverlay.addEventListener("click", function() { switchPage("home"); });
});
</script>
</body>
</html>
