<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB-0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<script>
(function() {
  var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobile || window.innerWidth < 768) {
    window.location.replace("mobile.html");
  }
})();
</script>
<style>
:root {
  --bg-color: #050505;
  --overlay-bg: rgba(5, 5, 5, 0.7);
  --white: #ffffff;
  --grid-color: rgba(255, 255, 255, 0.1);
  --font-header: "Syncopate", sans-serif;
  --font-body: "Space Grotesk", sans-serif;
  --font-mono: "Space Mono", monospace;
  --ease: cubic-bezier(0.8, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  width: 100%;
  height: 100%;
  background-color: var(--bg-color);
  color: var(--white);
  overflow: hidden;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

#dot-matrix-canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

#bg-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1;
  pointer-events: none;
}

.ui-grid {
  position: fixed;
  inset: 0;
  border: none;
  margin: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease-out;
  z-index: 5;
}

.stage {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  pointer-events: none;
}

#wordmark {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-weight: 700;
  font-size: 1.5rem;
  white-space: nowrap;
  letter-spacing: 0.1em;
  transform: scale(3.3333);
  transition: transform 1.2s var(--ease), opacity 0.8s ease;
  will-change: transform;
  opacity: 1;
}

.ab0-reveal {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  clip-path: inset(0 100% 0 0);
  transition: clip-path 1.2s var(--ease), opacity 0.6s var(--ease);
  will-change: clip-path;
  opacity: 0;
}

#wordmark.assembled .ab0-reveal {
  opacity: 1;
  clip-path: inset(0 0 0 0) !important;
}

#wordmark.docked {
  transform: translate(calc(-50vw + 60px + 1.9em), calc(-50vh + 45px + 0.4em)) scale(1);
  pointer-events: auto;
}

.desktop-icon {
  width: 1.1em;
  height: 1.1em;
  margin-left: 0.15em;
  flex-shrink: 0;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  display: inline-block;
}

.menu-items {
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  display: inline-flex;
  align-items: center;
  padding-left: 25px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s var(--ease);
}

#wordmark.docked .menu-items.visible {
  pointer-events: auto;
  opacity: 1;
}

.menu-item {
  color: var(--white);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  margin-right: 25px;
  text-transform: uppercase;
  transition: opacity 0.15s ease-out, filter 0.15s ease-out;
  cursor: pointer;
  pointer-events: auto;
  opacity: 1;
}

.menu-item.active {
  opacity: 1 !important;
  color: #FFFFFF !important;
  pointer-events: none;
}

.ui-visible { opacity: 1 !important; }

.overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 1.2s var(--ease), visibility 1.2s var(--ease);
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.overlay-frame {
  position: absolute;
  inset: 40px;
  border: none;
  pointer-events: none;
}

.coord {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
  letter-spacing: 0.1em;
}
.coord-tl { top: -20px; left: 0; }
.coord-br { bottom: -20px; right: 0; }

.content-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  width: 100%;
  max-width: 1200px;
  padding: 80px;
  pointer-events: auto;
}

#projects-overlay .content-grid {
  grid-template-columns: 0.7fr 1.3fr;
}

.col-left {
  display: flex;
  flex-direction: column;
  gap: 20px;
  border-right: 1px solid rgba(255, 255, 255, 0.05);
}

.project-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  width: 100%;
}

.project-entry {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  transition: opacity 0.4s var(--ease), transform 0.4s var(--ease);
  cursor: pointer;
  opacity: 0.5;
}

.project-entry.selected { opacity: 1; }
.project-info { display: flex; align-items: baseline; gap: 15px; font-family: var(--font-mono); text-transform: uppercase; }
.project-id { font-size: 0.6rem; color: rgba(255, 255, 255, 0.3); }
.project-name { font-size: 0.9rem; letter-spacing: 0.15em; }
.status-tag { font-size: 0.6rem; padding: 3px 8px; border: 1px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.7); font-family: var(--font-mono); }

.spec-panel { display: flex; flex-direction: column; gap: 20px; }
.video-container { width: 100%; aspect-ratio: 16/9; border: 1px solid rgba(255, 255, 255, 0.1); position: relative; overflow: hidden; background: #000; }
.video-container video { width: 100%; height: 100%; object-fit: cover; }

.timeline-container {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 100%;
}
.p-time { font-family: var(--font-mono); font-size: 0.65rem; color: var(--white); width: 40px; text-align: center; }

#p-bar {
  flex-grow: 1;
  -webkit-appearance: none;
  background: rgba(255, 255, 255, 0.1);
  height: 4px;
  outline: none;
  border: 1px solid rgba(255, 255, 255, 0.3);
  cursor: pointer;
}
#p-bar::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: var(--white);
  border: 1px solid #000;
  cursor: pointer;
}

.playback-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  padding: 15px 0;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}

.p-btn {
  background: none;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.5);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.3s var(--ease);
}
.p-btn:hover { border-color: var(--white); color: var(--white); }
.p-btn.play-pause { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }
.play-pause svg { width: 20px; height: 20px; fill: currentColor; }
.play-pause .pause-icon { display: none; }
.play-pause.playing .play-icon { display: none; }
.play-pause.playing .pause-icon { display: block; }

.spec-details { display: grid; grid-template-columns: 100px 1fr; gap: 10px; font-size: 0.7rem; font-family: var(--font-mono); text-transform: uppercase; }
.spec-label { color: rgba(255, 255, 255, 0.3); }
.spec-value { color: var(--white); }
</style>
</head>
<body>
<canvas id="dot-matrix-canvas"></canvas>
<div id="bg-overlay"></div>
<div class="ui-grid" id="grid"></div>

<div class="stage">
<div id="wordmark">
<a id="nav-home" class="menu-item" style="font-family:inherit; font-size:inherit; letter-spacing:inherit; margin:0; padding:0; text-transform: none;">
  <span>L</span><span class="ab0-reveal">AB-<svg class="desktop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
    <line x1="8" y1="21" x2="16" y2="21"></line>
    <line x1="12" y1="17" x2="12" y2="21"></line>
  </svg></span>
</a>
<div class="menu-items" id="menu">
<a id="projects-trigger" class="menu-item">PROJECTS</a>
<a id="about-trigger" class="menu-item">ABOUT</a>
</div>
</div>
</div>

<div id="projects-overlay" class="overlay">
<div class="overlay-frame">
<span class="coord coord-tl">[1111, 1111]</span>
<span class="coord coord-br">[9999, 9999]</span>
</div>
<div class="content-grid">
  <div class="col-left">
    <div class="project-list" id="p-list">
      <div class="project-entry selected" data-project="void">
        <div class="project-info"><span class="project-id">[01]</span><span class="project-name">VOID</span></div>
        <span class="status-tag">ACTIVE</span>
      </div>
      <div class="project-entry" data-project="attractor">
        <div class="project-info"><span class="project-id">[02]</span><span class="project-name">ATTRACTOR</span></div>
        <span class="status-tag">STANDBY</span>
      </div>
    </div>
  </div>
  <div class="col-right">
    <div class="spec-panel">
      <div class="video-container"><video id="p-video" playsinline loop muted></video></div>
      <div class="timeline-container">
        <div class="p-time" id="current-time">00:00</div>
        <input type="range" id="p-bar" min="0" value="0" step="0.01">
        <div class="p-time" id="duration-time">00:00</div>
      </div>
      <div class="playback-bar">
        <button class="p-btn" id="p-back-1s"><-1S</button>
        <button class="p-btn play-pause" id="play-pause">
          <svg class="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="p-btn" id="p-fwd-1s">+1S</button>
      </div>
      <div class="spec-details">
        <span class="spec-label">Pipeline:</span><span class="spec-value" id="s-pipeline">---</span>
        <span class="spec-label">Complexity:</span><span class="spec-value" id="s-complexity">---</span>
      </div>
    </div>
  </div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  var wordmark = document.getElementById("wordmark");
  var grid = document.getElementById("grid");
  var menu = document.getElementById("menu");
  var projectsTrigger = document.getElementById("projects-trigger");
  var navHome = document.getElementById("nav-home");
  var projectsOverlay = document.getElementById("projects-overlay");

  var pVideo = document.getElementById("p-video");
  var playBtn = document.getElementById("play-pause");
  var pBar = document.getElementById("p-bar");
  var curTimeTxt = document.getElementById("current-time");
  var durTimeTxt = document.getElementById("duration-time");
  var sPipeline = document.getElementById("s-pipeline");
  var sComplexity = document.getElementById("s-complexity");

  var projectData = {
    void: { video: "void.mov", pipeline: "HLSL / Compute", complexity: "12.4M Particles" },
    attractor: { video: "attractor.mp4", pipeline: "GLSL / Vertex", complexity: "Lorenz / 60FPS" }
  };

  setTimeout(function() { if (wordmark) wordmark.classList.add("assembled"); }, 1500);
  setTimeout(function() { if (wordmark) wordmark.classList.add("docked"); }, 3500);
  setTimeout(function() { if (grid) grid.classList.add("ui-visible"); if (menu) menu.classList.add("visible"); }, 4700);

  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? "0" + m : m) + ":" + (sec < 10 ? "0" + sec : sec);
  }

  function updateProject(pid) {
    var data = projectData[pid];
    if (!data) return;
    pVideo.pause();
    playBtn.classList.remove("playing");
    pVideo.src = data.video;
    pVideo.load();
    sPipeline.innerText = data.pipeline;
    sComplexity.innerText = data.complexity;
  }

  if (projectsTrigger) projectsTrigger.addEventListener("click", function() {
    projectsOverlay.classList.add("active");
    updateProject("void");
  });

  if (navHome) navHome.addEventListener("click", function() { projectsOverlay.classList.remove("active"); });

  var projectEntries = document.querySelectorAll(".project-entry");
  projectEntries.forEach(function(entry) {
    entry.addEventListener("click", function() {
      projectEntries.forEach(function(e) { e.classList.remove("selected"); });
      entry.classList.add("selected");
      updateProject(entry.getAttribute("data-project"));
    });
  });

  if (playBtn) playBtn.addEventListener("click", function() {
    if (pVideo.paused) { pVideo.play(); playBtn.classList.add("playing"); }
    else { pVideo.pause(); playBtn.classList.remove("playing"); }
  });

  if (pVideo) {
    pVideo.addEventListener("timeupdate", function() {
      if (!isNaN(pVideo.duration)) {
        var v = (pVideo.currentTime / pVideo.duration) * 100;
        pBar.value = v;
        curTimeTxt.innerText = formatTime(pVideo.currentTime);
      }
    });
    pVideo.addEventListener("loadedmetadata", function() {
      durTimeTxt.innerText = formatTime(pVideo.duration);
    });
  }

  if (pBar) pBar.addEventListener("input", function() {
    var t = (pBar.value / 100) * pVideo.duration;
    pVideo.currentTime = t;
  });

  document.getElementById("p-back-1s").addEventListener("click", function() { pVideo.currentTime -= 1; });
  document.getElementById("p-fwd-1s").addEventListener("click", function() { pVideo.currentTime += 1; });
});
</script>
</body>
</html>
