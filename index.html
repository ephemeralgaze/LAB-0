<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --syncopate: 'Syncopate', sans-serif;
            --space-grotesk: 'Space Grotesk', sans-serif;
            --space-mono: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            font-family: var(--space-grotesk);
            -webkit-font-smoothing: antialiased;
        }

        /* Grid Background */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid var(--grid-color);
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }

        .grid-line-h {
            position: absolute;
            width: 100%;
            height: 1px;
            background: var(--grid-color);
            top: 50%;
            transform: translateY(-50%);
        }

        .grid-line-v {
            position: absolute;
            height: 100%;
            width: 1px;
            background: var(--grid-color);
            left: 50%;
            transform: translateX(-50%);
        }

        /* Intro Sequence Container */
        .stage {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .wordmark-container {
            display: flex;
            align-items: center;
            font-family: var(--syncopate);
            font-weight: 700;
            font-size: 5rem;
            letter-spacing: -0.05em;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 50;
        }

        .wordmark-container.docked {
            top: 40px;
            left: 40px;
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            transform: translate(0, 0);
        }

        /* SVG L Animation */
        .l-stroke {
            fill: transparent;
            stroke: white;
            stroke-width: 1px;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: drawL 1.5s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes drawL {
            to {
                stroke-dashoffset: 0;
            }
        }

        .l-fill {
            fill: white;
            opacity: 0;
            animation: fillL 0.5s forwards 1.5s ease-in-out;
        }

        @keyframes fillL {
            to {
                opacity: 1;
            }
        }

        /* Sliding LAB-0 Assembly */
        .l-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1) 2s;
        }

        .wordmark-container.assembled .l-wrapper {
            transform: translateX(-0.1em);
        }

        .ab0-wrapper {
            display: inline-block;
            max-width: 0;
            overflow: hidden;
            white-space: nowrap;
            opacity: 0;
            transition: max-width 0.8s cubic-bezier(0.85, 0, 0.15, 1) 2.0s, 
                        opacity 0.5s ease 2.1s,
                        transform 0.8s cubic-bezier(0.85, 0, 0.15, 1) 2.0s;
            transform: translateX(0.5em);
        }

        .wordmark-container.assembled .ab0-wrapper {
            max-width: 1000px; 
            opacity: 1;
            transform: translateX(0);
        }

        /* UI Elements Fade-in */
        .ui-element {
            opacity: 0;
            transition: opacity 1s ease-in-out 4.3s;
            position: fixed;
            z-index: 20;
        }

        .ui-visible {
            opacity: 1;
        }

        .grid-visible {
            opacity: 1;
            transition: opacity 1.5s ease-in-out 4s;
        }

        /* Cursor Tracker */
        .cursor-tracker {
            bottom: 40px;
            left: 40px;
            font-family: var(--space-mono);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        /* System State Indicator */
        .system-state {
            top: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            font-family: var(--space-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .dot-matrix {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            margin-right: 12px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

        /* Terminal Console */
        .terminal {
            bottom: 40px;
            right: 40px;
            text-align: right;
            font-family: var(--space-mono);
            font-size: 0.75rem;
            line-height: 1.6;
        }

        .terminal span {
            display: block;
            color: rgba(255, 255, 255, 0.5);
        }

        .terminal .status-ready {
            color: #fff;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="grid-overlay" id="grid">
        <div class="grid-line-h"></div>
        <div class="grid-line-v"></div>
    </div>

    <div class="stage">
        <div class="wordmark-container" id="wordmark">
            <div class="l-wrapper">
                <svg width="1em" height="1em" viewBox="0 0 100 100">
                    <path class="l-stroke" d="M35 25 V75 H65" />
                    <path class="l-fill" d="M35 25 V75 H65 V70 H40 V25 Z" />
                </svg>
            </div>
            <div class="ab0-wrapper">AB-0</div>
        </div>
    </div>

    <!-- UI Components -->
    <div class="ui-element cursor-tracker" id="ui-coords">
        X: 0000 // Y: 0000
    </div>

    <div class="ui-element system-state" id="ui-state">
        <div class="dot-matrix"></div>
        SYSTEM ACTIVE // STABLE
    </div>

    <div class="ui-element terminal" id="ui-terminal">
        <span>INITIALIZING KERNEL...</span>
        <span>AUTH_TOKEN: 0x0LAB0</span>
        <span class="status-ready">SYSTEM READY</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const uiElements = document.querySelectorAll('.ui-element');
            const coordsDisplay = document.getElementById('ui-coords');

            // Initial Centering
            wordmark.style.top = '50%';
            wordmark.style.left = '50%';
            wordmark.style.transform = 'translate(-50%, -50%)';

            // Phase 2: Assembly (at 2.0s)
            setTimeout(() => {
                wordmark.classList.add('assembled');
            }, 2000);

            // Phase 3: Docking (at 3.5s)
            setTimeout(() => {
                wordmark.classList.add('docked');
                // Remove the manual centering to let .docked styles take over
                wordmark.style.top = '';
                wordmark.style.left = '';
                wordmark.style.transform = '';
            }, 3500);

            // Phase 4: UI Fade-in (at 4.0s - 4.3s)
            setTimeout(() => {
                grid.classList.add('grid-visible');
                uiElements.forEach(el => el.classList.add('ui-visible'));
            }, 4000);

            // Coordinate Tracker Logic
            window.addEventListener('mousemove', (e) => {
                const x = String(Math.round(e.clientX)).padStart(4, '0');
                const y = String(Math.round(e.clientY)).padStart(4, '0');
                coordsDisplay.innerText = `X: ${x} // Y: ${y}`;
            });
        });
    </script>
</body>
</html>
