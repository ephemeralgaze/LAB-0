<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --white: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--white);
            overflow: hidden;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        /* 1px Grid Borders */
        .ui-grid {
            position: fixed;
            inset: 0;
            border: 1px solid var(--grid-color);
            margin: 20px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        /* Intro Sequence */
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wordmark {
            display: flex;
            align-items: baseline; /* Ensure letters share a common baseline */
            font-family: var(--font-header);
            font-weight: 700;
            font-size: 5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 1s cubic-bezier(0.8, 0, 0.2, 1);
            z-index: 100;
        }

        /* Docking Style */
        #wordmark.docked {
            top: 60px;
            left: 60px;
            font-size: 1.5rem;
            transform: translate(0, 0);
        }

        /* L Animation */
        .l-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1) 2s;
        }

        /* 
           Using a text-based L for initial stroke drawing ensures 
           it has identical metrics to the 'AB-0' text.
        */
        .l-text-mask {
            position: relative;
            color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .l-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .l-stroke {
            fill: none;
            stroke: var(--white);
            stroke-width: 2px;
            stroke-dasharray: 500;
            stroke-dashoffset: 500;
            animation: drawStroke 1.5s forwards linear;
        }

        @keyframes drawStroke {
            to { stroke-dashoffset: 0; }
        }

        /* Solid L fill that matches font exactly */
        .l-solid {
            position: absolute;
            top: 0;
            left: 0;
            color: var(--white);
            opacity: 0;
            animation: fadeInFill 0.5s forwards 1.5s ease-out;
        }

        @keyframes fadeInFill {
            to { opacity: 1; }
        }

        /* Assembly Logic */
        .ab0-container {
            display: inline-block;
            max-width: 0;
            overflow: hidden;
            white-space: nowrap;
            opacity: 0;
            line-height: 1;
            transition: max-width 0.8s cubic-bezier(0.8, 0, 0.2, 1) 2s, 
                        opacity 0.6s ease-out 2s,
                        transform 0.8s cubic-bezier(0.8, 0, 0.2, 1) 2s;
            transform: translateX(20px) scale(0.9); /* Start at scale 0.9 to match L later */
            transform-origin: left baseline;
        }

        /* Assembly Trigger (at 2.0s) */
        #wordmark.assembled .l-container {
            transform: translateX(-0.05em) scale(0.9);
            transform-origin: right baseline;
        }

        #wordmark.assembled .ab0-container {
            max-width: 500px;
            opacity: 1;
            transform: translateX(0) scale(0.9);
        }

        /* UI Elements */
        .ui-element {
            position: fixed;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 10;
            font-family: var(--font-mono);
            text-transform: uppercase;
        }

        .ui-visible {
            opacity: 1;
        }

        .coords-tracker {
            bottom: 60px;
            left: 60px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .system-status {
            top: 60px;
            right: 60px;
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
        }

        .dot-matrix {
            width: 6px;
            height: 6px;
            background: var(--white);
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .terminal-log {
            bottom: 60px;
            right: 60px;
            text-align: right;
            font-size: 0.7rem;
            line-height: 1.5;
        }

        .terminal-log span {
            display: block;
            color: rgba(255, 255, 255, 0.4);
        }

        .terminal-log .ready {
            color: var(--white);
            font-weight: bold;
            margin-top: 4px;
        }

    </style>
</head>
<body>

    <div class="ui-grid" id="grid"></div>

    <div class="stage">
        <div id="wordmark">
            <div class="l-container">
                <div class="l-text-mask">
                    L
                    <svg class="l-svg-overlay" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <!-- Precise stroke path aligned to the Syncopate 'L' shape -->
                        <path class="l-stroke" d="M30 20 V80 H70" />
                    </svg>
                    <div class="l-solid">L</div>
                </div>
            </div>
            <div class="ab0-container">AB-0</div>
        </div>
    </div>

    <!-- UI Overlays -->
    <div class="ui-element coords-tracker" id="ui-coords">
        X-0000 // Y-0000
    </div>

    <div class="ui-element system-status" id="ui-status">
        <div class="dot-matrix"></div>
        SYSTEM ACTIVE // LOGGED
    </div>

    <div class="ui-element terminal-log" id="ui-terminal">
        <span>BUFF_OVR: CLEAR</span>
        <span>LINK: ESTABLISHED</span>
        <span class="ready">SYSTEM READY</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wordmark = document.getElementById('wordmark');
            const grid = document.getElementById('grid');
            const uiCoords = document.getElementById('ui-coords');
            const uiStatus = document.getElementById('ui-status');
            const uiTerminal = document.getElementById('ui-terminal');

            // 2.0s: Assemble wordmark
            setTimeout(() => {
                wordmark.classList.add('assembled');
            }, 2000);

            // 3.5s: Dock to corner
            setTimeout(() => {
                wordmark.classList.add('docked');
            }, 3500);

            // 4.5s: UI elements fade in
            setTimeout(() => {
                grid.classList.add('ui-visible');
                uiCoords.classList.add('ui-visible');
                uiStatus.classList.add('ui-visible');
                uiTerminal.classList.add('ui-visible');
            }, 4500);

            // Cursor Coordinate Tracker
            window.addEventListener('mousemove', (e) => {
                const x = e.clientX.toString().padStart(4, '0');
                const y = e.clientY.toString().padStart(4, '0');
                uiCoords.innerText = `X-${x} // Y-${y}`;
            });
        });
    </script>
</body>
</html>
