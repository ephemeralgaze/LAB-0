<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPHEMERAL GAZE | LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400&family=Space+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-code: 'Space Mono', monospace;
            --transition-speed: 1.2s;
            --ease: cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-body);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .word-wrapper {
            overflow: hidden;
            height: 1.2em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .intro-text {
            font-family: var(--font-header);
            font-weight: 700;
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        #ephemeral {
            transform: translateY(110%);
            animation: slideUp var(--transition-speed) var(--ease) forwards 0.5s;
        }

        #gaze {
            display: inline-block;
            transform: scaleX(1);
            opacity: 0;
            animation: fadeIn var(--transition-speed) var(--ease) forwards 0.8s;
        }

        /* Transition Phase */
        .stage-transition #ephemeral {
            animation: slideUpOut var(--transition-speed) var(--ease) forwards;
        }

        .stage-transition #gaze {
            animation: collapseGaze var(--transition-speed) var(--ease) forwards;
        }

        #eye-logo {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 40px;
            height: 24px;
            opacity: 0;
            z-index: 100;
            transition: opacity var(--transition-speed) var(--ease);
        }

        .eye-shape {
            fill: none;
            stroke: white;
            stroke-width: 1.5;
        }

        .pupil {
            fill: white;
        }

        #content {
            opacity: 0;
            transition: opacity var(--transition-speed) var(--ease) 0.5s;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        code {
            font-family: var(--font-code);
            background: #111;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
        }

        @keyframes slideUp {
            to { transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes slideUpOut {
            to { transform: translateY(-110%); opacity: 0; }
        }

        @keyframes collapseGaze {
            0% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        .active-logo {
            opacity: 1 !important;
        }

        .active-content {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="intro-container">
        <div class="word-wrapper">
            <span id="ephemeral" class="intro-text">EPHEMERAL</span>
        </div>
        <div class="word-wrapper">
            <span id="gaze" class="intro-text">GAZE</span>
        </div>
    </div>

    <svg id="eye-logo" viewBox="0 0 40 24" xmlns="http://www.w3.org/2000/svg">
        <path class="eye-shape" d="M2,12 C2,12 10,2 20,2 C30,2 38,12 38,12 C38,12 30,22 20,22 C10,22 2,12 2,12 Z" />
        <circle class="pupil" cx="20" cy="12" r="5" />
    </svg>

    <div id="content">
        <h1 style="font-family: var(--font-header); font-size: 1rem; margin-bottom: 2rem;">LAB-0 / INITIALIZATION</h1>
        <p>A pristine environment for experimental visual research.</p>
        <p style="margin-top: 1rem;"><code>system.status: active</code></p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('intro-container');
            const logo = document.getElementById('eye-logo');
            const content = document.getElementById('content');

            // Sequence timing
            setTimeout(() => {
                container.classList.add('stage-transition');
                
                setTimeout(() => {
                    container.style.display = 'none';
                    logo.classList.add('active-logo');
                    content.classList.add('active-content');
                }, 1200);
            }, 3000);
        });
    </script>
</body>
</html>
