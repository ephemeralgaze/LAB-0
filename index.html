<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB-0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.1);
            --font-header: 'Syncopate', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --transition-main: 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Loading State --- */
        #loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: transform var(--transition-main), top var(--transition-main), left var(--transition-main);
            position: absolute;
            z-index: 100;
        }

        .lab-text {
            font-family: var(--font-header);
            font-weight: 700;
            font-size: clamp(2rem, 5vw, 4rem);
            letter-spacing: 2em; /* Initial tracking */
            text-indent: 2em;    /* Center tracking */
            opacity: 0;
            animation: loadIn 3s var(--transition-main) forwards;
        }

        .loading-line {
            width: 0;
            height: 1px;
            background: var(--text-primary);
            animation: lineExpand 2.5s var(--transition-main) forwards 0.5s;
        }

        /* --- Animations --- */
        @keyframes loadIn {
            0% { opacity: 0; letter-spacing: 2em; text-indent: 2em; }
            100% { opacity: 1; letter-spacing: 0.5em; text-indent: 0.5em; }
        }

        @keyframes lineExpand {
            0% { width: 0; opacity: 0; }
            20% { opacity: 1; }
            100% { width: 200px; opacity: 1; }
        }

        /* --- Docked State --- */
        #loader-container.docked {
            top: 2rem;
            left: 2rem;
            transform: translate(0, 0) scale(0.4);
            transform-origin: top left;
            align-items: flex-start;
        }

        #loader-container.docked .loading-line {
            display: none;
        }

        /* --- UI Elements --- */
        #interface {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease 1s;
            border: 1px solid var(--border-color);
            margin: 1rem;
        }

        #interface.visible {
            opacity: 1;
        }

        .coordinates {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
        }

        .dot-matrix {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            display: grid;
            grid-template-columns: repeat(4, 4px);
            gap: 4px;
        }

        .dot {
            width: 2px;
            height: 2px;
            background: var(--text-primary);
            opacity: 0.3;
        }

        .dot.blink {
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- Status Log --- */
        .status-logs {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-family: var(--font-mono);
            font-size: 10px;
            text-align: right;
            color: var(--text-secondary);
        }

    </style>
</head>
<body>

    <div id="loader-container">
        <div class="lab-text">LAB-0</div>
        <div class="loading-line"></div>
    </div>

    <div id="interface">
        <div class="status-logs">
            SYS: ACTIVE<br>
            NET: ENCRYPTED<br>
            FARADAY: ENABLED
        </div>

        <div class="coordinates" id="coord-tracker">
            LAT: 34.0522 N / LONG: 118.2437 W
        </div>

        <div class="dot-matrix">
            <div class="dot blink"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot blink" style="animation-delay: 0.5s"></div>
            <div class="dot"></div>
            <div class="dot blink" style="animation-delay: 1.2s"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const loader = document.getElementById('loader-container');
            const ui = document.getElementById('interface');
            const coords = document.getElementById('coord-tracker');

            // 1. Initial positioning
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            loader.style.top = `${centerY}px`;
            loader.style.left = `${centerX}px`;
            loader.style.transform = 'translate(-50%, -50%)';

            // 2. Sequence
            setTimeout(() => {
                // Dock to top-left
                loader.classList.add('docked');
                
                // Show UI
                setTimeout(() => {
                    ui.classList.add('visible');
                }, 1000);
            }, 4000);

            // 3. Live terminal aesthetic (coordinates tracker)
            window.addEventListener('mousemove', (e) => {
                if (ui.classList.contains('visible')) {
                    const x = e.clientX.toString().padStart(4, '0');
                    const y = e.clientY.toString().padStart(4, '0');
                    coords.innerText = `X-${x} // Y-${y} // STABLE`;
                }
            });
        });
    </script>
</body>
</html>
