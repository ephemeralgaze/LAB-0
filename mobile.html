<style>
:root {
  --bg-color: #050505;
  --overlay-bg: rgba(5, 5, 5, 0.7);
  --white: #ffffff;
  --grid-color: rgba(255, 255, 255, 0.1);
  --font-header: "Syncopate", sans-serif;
  --font-body: "Space Grotesk", sans-serif;
  --font-mono: "Space Mono", monospace;
  --ease: cubic-bezier(0.8, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body, html {
  width: 100%;
  height: 100%;
  background-color: var(--bg-color);
  color: var(--white);
  overflow: hidden;
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

/* Canvas Layer */
#dot-matrix-canvas {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  width: 100%;
  height: 100%;
}

/* Background Overlay */
#bg-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 1;
  pointer-events: none;
}

/* 1px Grid Borders */
.ui-grid {
  position: fixed;
  inset: 0;
  border: none;
  margin: 10px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease-out;
  z-index: 5;
}

/* NAVIGATION LAYER */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  pointer-events: none;
}

#wordmark {
  position: absolute;
  top: 50%;
  left: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-weight: 700;
  font-size: 1.5rem;
  height: 24px;
  line-height: 24px;
  white-space: nowrap;
  letter-spacing: 0;
  transform: translate(-50%, -50%) scale(3.3333);
  transition: transform 1.2s var(--ease), top 1.2s var(--ease), left 1.2s var(--ease), opacity 0.8s ease;
  will-change: transform, top, left;
  opacity: 1;
  width: auto;
  overflow: visible;
}

.l-char {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 24px;
  line-height: 24px;
}

.ab0-reveal {
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  white-space: nowrap;
  clip-path: inset(0 100% 0 0) !important;
  opacity: 0;
  visibility: hidden;
  transition: clip-path 1.2s var(--ease), opacity 0.6s var(--ease), visibility 0.4s var(--ease);
  will-change: clip-path;
  height: 24px;
  line-height: 24px;
}

#wordmark.docked {
  top: 37px;
  left: 30px;
  transform: translate(0, -50%) scale(0.85);
  pointer-events: auto;
}

#wordmark.docked-final .ab0-reveal {
  opacity: 1 !important;
  visibility: visible !important;
  clip-path: inset(0 0 0 0) !important;
}

.mobile-icon {
  width: 1.1em;
  height: 1.1em;
  margin-left: 0.08em;
  flex-shrink: 0;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  display: block;
}

/* MOBILE HEADER */
#mobile-header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 74px;
  background: #050505;
  z-index: 10002;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.6s var(--ease), visibility 0.6s var(--ease);
}

#mobile-header.active {
  opacity: 1;
  visibility: visible;
}

/* SpaceX-style Hamburger Menu */
.hamburger {
  position: fixed;
  top: 0;
  right: 30px;
  width: 24px;
  height: 74px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  cursor: pointer;
  z-index: 10003;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease-out;
}

.hamburger.ui-visible {
  opacity: 1;
  pointer-events: auto;
}

.hamburger-inner {
  width: 100%;
  height: 14px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.hamburger span {
  display: block;
  width: 100%;
  height: 1px;
  background-color: var(--white);
  transition: transform 0.4s var(--ease), opacity 0.4s var(--ease);
}

.hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

/* Mobile Nav Drawer */
.mobile-nav-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-color);
  z-index: 10001;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 40px;
  transform: translateX(100%);
  transition: transform 0.6s var(--ease);
  pointer-events: auto;
}

.mobile-nav-overlay.open {
  transform: translateX(0);
}

.mobile-menu-item {
  font-family: var(--font-header);
  font-size: 1.2rem;
  letter-spacing: 0.3em;
  color: var(--white);
  text-decoration: none;
  text-transform: uppercase;
  opacity: 0.6;
  transition: opacity 0.3s ease;
}

.ui-visible { opacity: 1 !important; }

/* OVERLAY STYLES */
.overlay {
  position: fixed;
  inset: 0;
  background: #050505;
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 1.2s var(--ease), visibility 1.2s var(--ease);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow-y: auto;
}

.overlay.active {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

.content-grid {
  display: flex;
  flex-direction: column;
  gap: 40px;
  padding: 114px 30px 60px;
  width: 100%;
  pointer-events: auto;
}

.col-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  padding-bottom: 30px;
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 6px;
  background: rgba(255, 255, 255, 0.05);
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.username {
  font-family: var(--font-header);
  font-size: 1.1rem;
  letter-spacing: 0.3em;
  color: var(--white);
  text-transform: lowercase;
}

.col-right {

  justify-content: center;

  font-family: var(--font-mono);
}

.info-item {
  display: flex;
  align-items: center;

  color: rgba(255, 255, 255, 0.7);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  padding: 4px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.info-icon {
  width: 16px;

  opacity: 0.8;

.info-label {
  width: 110px;

  color: rgba(255, 255, 255, 0.3);

.info-value {

}

.mail-link {
  color: var(--white);
  text-decoration: none;
  word-break: break-all;
  transition: opacity 0.3s ease;
}
</style>
</head>
<body>

<script>
(function() {
  const canvas = document.getElementById("dot-matrix-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  let dots = [];
  let width, height, dpr;

  const GRID_SIZE = 30;
  const DOT_RADIUS = 1.2;

  function init() {
    dpr = window.devicePixelRatio || 1;
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    
    dots = [];
    const cols = Math.ceil(width / GRID_SIZE);
    const rows = Math.ceil(height / GRID_SIZE);

    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        dots.push({
          x: i * GRID_SIZE + GRID_SIZE / 2,
          y: j * GRID_SIZE + GRID_SIZE / 2,
          phase: Math.random() * Math.PI * 2,
          freq: 0.02 + Math.random() * 0.03,
          maxOpacity: 0.05 + Math.random() * 0.55
        });
      }
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, width, height);
    dots.forEach(function(dot) {
      const opacity = (Math.sin(time * 0.001 * dot.freq * 100 + dot.phase) * 0.5 + 0.5) * dot.maxOpacity;
      ctx.beginPath();
      ctx.arc(dot.x, dot.y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, " + opacity.toFixed(3) + ")";
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener("resize", init);
  init();
  requestAnimationFrame(draw);
})();

document.addEventListener("DOMContentLoaded", function() {
  const wordmark = document.getElementById("wordmark");
  const grid = document.getElementById("grid");
  const aboutOverlay = document.getElementById("about-overlay");
  const hamburger = document.getElementById("hamburger");
  const mobileNav = document.getElementById("mobile-nav");
  const mNavHome = document.getElementById("m-nav-home");
  const mAboutTrigger = document.getElementById("m-about-trigger");
  const mobileHeader = document.getElementById("mobile-header");

  setTimeout(function() { 
    if (wordmark) wordmark.classList.add("docked");
  }, 3500);

  if (wordmark) {
    wordmark.addEventListener("transitionend", function(e) {
      if (e.propertyName === "top" || e.propertyName === "transform") {
        if (wordmark.classList.contains("docked") && !wordmark.classList.contains("docked-final")) {
          if (grid) grid.classList.add("ui-visible");
          if (hamburger) hamburger.classList.add("ui-visible");
          wordmark.classList.add("docked-final");
        }
      }
    });
  }

  const switchPage = function(pageId) {
    if (aboutOverlay) aboutOverlay.classList.remove("active");
    if (mobileHeader) mobileHeader.classList.remove("active");

    if (pageId === "about") {
      if (aboutOverlay) aboutOverlay.classList.add("active");
      if (mobileHeader) mobileHeader.classList.add("active");
    }
    if (hamburger) hamburger.classList.remove("open");
    if (mobileNav) mobileNav.classList.remove("open");
  };

  if (hamburger) {
    hamburger.addEventListener("click", function() {
      hamburger.classList.toggle("open");
      mobileNav.classList.toggle("open");
    });
  }

  if (mAboutTrigger) mAboutTrigger.addEventListener("click", function() { switchPage("about"); });
  if (mNavHome) mNavHome.addEventListener("click", function() { switchPage("home"); });
});
</script>
