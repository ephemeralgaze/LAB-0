<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAB-0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<script>

(function() {
  var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  if (isMobile || window.innerWidth < 768) {
    window.location.replace("Mobile.html");
  }
})();

document.addEventListener("DOMContentLoaded", function() {
  var wordmark = document.getElementById("wordmark");
  var grid = document.getElementById("grid");
  var menu = document.getElementById("menu");
  var projectsTrigger = document.getElementById("projects-trigger");
  var aboutTrigger = document.getElementById("about-trigger");
  var navHome = document.getElementById("nav-home");
  var projectsOverlay = document.getElementById("projects-overlay");
  var aboutOverlay = document.getElementById("about-overlay");

  var pVideo = document.getElementById("p-video");
  var playBtn = document.getElementById("play-pause");
  var pBarContainer = document.getElementById("p-bar-container");
  var pBarFill = document.getElementById("p-bar-fill");
  var curTimeTxt = document.getElementById("current-time");
  var durTimeTxt = document.getElementById("duration-time");
  var sPipeline = document.getElementById("s-pipeline");
  var sComplexity = document.getElementById("s-complexity");
  var noSignal = document.getElementById("no-signal");

  var projectData = {
    void: { video: "void.mov", pipeline: "HLSL / Compute", complexity: "12.4M Particles" },
    attractor: { video: "", pipeline: "GLSL / Vertex", complexity: "Lorenz / 60FPS" },
    horizon: { video: "", pipeline: "PBR / Raycast", complexity: "Dynamic SDF" },
    quantum: { video: "", pipeline: "VFX / Compute", complexity: "Q-Field Sim" },
    monolith: { video: "", pipeline: "Geometry Shaders", complexity: "Instanced Mesh" }
  };

  setTimeout(function() { if (wordmark) wordmark.classList.add("assembled"); }, 1500);
  setTimeout(function() { if (wordmark) wordmark.classList.add("docked"); }, 3500);
  setTimeout(function() { if (grid) grid.classList.add("ui-visible"); if (menu) menu.classList.add("visible"); }, 4700);

  function formatTime(s) {
    var m = Math.floor(s / 60);
    var sec = Math.floor(s % 60);
    return (m < 10 ? "0" + m : m) + ":" + (sec < 10 ? "0" + sec : sec);
  }

  function updateProject(pid) {
    var data = projectData[pid];
    if (!data) return;
    
    pVideo.pause();
    pVideo.src = "";
    pVideo.load();
    pVideo.currentTime = 0;
    if (pBarFill) pBarFill.style.width = "0%";
    playBtn.classList.remove("playing");
    
    if (data.video && data.video !== "") {
      curTimeTxt.innerText = "00:00";
      durTimeTxt.innerText = "00:00";
      noSignal.style.display = "none";
      pVideo.src = data.video;
      pVideo.load();
    } else {
      curTimeTxt.innerText = "--:--";
      durTimeTxt.innerText = "--:--";
      pVideo.src = "";
      noSignal.style.display = "flex";
    }
    
    sPipeline.innerText = data.pipeline;
    sComplexity.innerText = data.complexity;
  }

  if (projectsTrigger) projectsTrigger.addEventListener("click", function() {
    aboutOverlay.classList.remove("active");
    projectsOverlay.classList.add("active");
    var selectedEntry = document.querySelector(".project-entry.selected");
    if (selectedEntry) {
      updateProject(selectedEntry.getAttribute("data-project"));
    } else {
      updateProject("void");
    }
  });

  if (aboutTrigger) {
    aboutTrigger.addEventListener("click", function() {
      projectsOverlay.classList.remove("active");
      aboutOverlay.classList.add("active");
      pVideo.pause();
      playBtn.classList.remove("playing");
    });
  }

  if (navHome) {
    navHome.addEventListener("click", function() { 
      projectsOverlay.classList.remove("active"); 
      aboutOverlay.classList.remove("active"); 
      pVideo.pause();
      playBtn.classList.remove("playing");
    });
  }

  var projectEntries = document.querySelectorAll(".project-entry");
  projectEntries.forEach(function(entry) {
    entry.addEventListener("click", function() {
      projectEntries.forEach(function(e) { e.classList.remove("selected"); });
      entry.classList.add("selected");
      updateProject(entry.getAttribute("data-project"));
    });
  });

  if (playBtn) playBtn.addEventListener("click", function() {
    if (pVideo.paused) { pVideo.play(); playBtn.classList.add("playing"); }
    else { pVideo.pause(); playBtn.classList.remove("playing"); }
  });

  if (pVideo) {
    pVideo.addEventListener("timeupdate", function() {
      if (!isNaN(pVideo.duration) && pVideo.duration > 0) {
        var v = (pVideo.currentTime / pVideo.duration) * 100;
        if (pBarFill) pBarFill.style.width = v + "%";
        curTimeTxt.innerText = formatTime(pVideo.currentTime);
      }
    });
    pVideo.addEventListener("loadedmetadata", function() {
      durTimeTxt.innerText = formatTime(pVideo.duration);
    });
  }

  if (pBarContainer) {
    pBarContainer.addEventListener("click", function(e) {
      if (!isNaN(pVideo.duration) && pVideo.duration > 0) {
        var rect = pBarContainer.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var pct = x / rect.width;
        if (pct < 0) pct = 0;
        if (pct > 1) pct = 1;
        pVideo.currentTime = pct * pVideo.duration;
      }
    });
  }

  function syncPause() { if (!pVideo.paused) { pVideo.pause(); playBtn.classList.remove("playing"); } }
  document.getElementById("p-back-1s").addEventListener("click", function() { syncPause(); pVideo.currentTime -= 1; });
  document.getElementById("p-fwd-1s").addEventListener("click", function() { syncPause(); pVideo.currentTime += 1; });
  document.getElementById("p-back-f").addEventListener("click", function() { syncPause(); pVideo.currentTime -= (1/60); });
  document.getElementById("p-fwd-f").addEventListener("click", function() { syncPause(); pVideo.currentTime += (1/60); });
  
  var volBtn = document.getElementById("p-vol");
  if (volBtn) {
    volBtn.addEventListener("click", function() {
      if (pVideo.muted) {
        pVideo.muted = false;
        pVideo.volume = 1.0;
        volBtn.innerText = "VOL: 1";
      } else if (pVideo.volume > 0) {
        pVideo.volume = 0;
        pVideo.muted = true;
        volBtn.innerText = "VOL: 0";
      } else {
        pVideo.muted = false;
        pVideo.volume = 1.0;
        volBtn.innerText = "VOL: 1";
      }
    });
  }

  var fsBtn = document.getElementById("p-fs");
  if (fsBtn) {
    fsBtn.addEventListener("click", function() {
      if (pVideo.requestFullscreen) pVideo.requestFullscreen();
      else if (pVideo.webkitRequestFullscreen) pVideo.webkitRequestFullscreen();
      else if (pVideo.msRequestFullscreen) pVideo.msRequestFullscreen();
    });
  }

  (function() {
    var canvas = document.getElementById("dot-matrix-canvas");
    if (!canvas) return;
    var ctx = canvas.getContext("2d");
    var dots = [];
    var width, height, dpr;

    var GRID_SIZE = 30;
    var DOT_RADIUS = 1.2;

    function init() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.scale(dpr, dpr);
      
      dots = [];
      var cols = Math.ceil(width / GRID_SIZE);
      var rows = Math.ceil(height / GRID_SIZE);

      for (var i = 0; i < cols; i++) {
        for (var j = 0; j < rows; j++) {
          dots.push({
            x: i * GRID_SIZE + GRID_SIZE / 2,
            y: j * GRID_SIZE + GRID_SIZE / 2,
            phase: Math.random() * Math.PI * 2,
            freq: 0.02 + Math.random() * 0.03,
            maxOpacity: 0.02 + Math.random() * 0.28
          });
        }
      }
    }

    function draw(time) {
      ctx.clearRect(0, 0, width, height);
      
      dots.forEach(function(dot) {
        var opacity = (Math.sin(time * 0.001 * dot.freq * 100 + dot.phase) * 0.5 + 0.5) * dot.maxOpacity;
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, DOT_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, " + opacity.toFixed(3) + ")";
        ctx.fill();
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", init);
    init();
    requestAnimationFrame(draw);
  })();
});
</script>
</body>
</html>
